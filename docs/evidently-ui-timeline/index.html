  /* Sidebar */
  .sidebar { width: 280px; min-width: 280px; background: #161b22; border-right: 1px solid #30363d; overflow-y: auto; padding: 16px 0; transition: width 0.2s, min-width 0.2s, padding 0.2s; }
  .sidebar.collapsed { width: 0; min-width: 0; padding: 0; overflow: hidden; border-right: none; }
  .sidebar h2 { padding: 0 16px 12px; font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px; color: #8b949e; font-weight: 600; }
  .toggle-sidebar { background: #21262d; border: 1px solid #30363d; color: #c9d1d9; width: 32px; height: 32px; border-radius: 6px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; flex-shrink: 0; }
  .toggle-sidebar:hover { background: #30363d; color: #f0f6fc; }
  .sidebar-item { padding: 10px 16px; cursor: pointer; font-size: 13px; color: #c9d1d9; border-left: 3px solid transparent; transition: all 0.15s;}
  .sidebar-item:hover { background: #1c2128; color: #f0f6fc; }
  .sidebar-item.active { background: #1c2128; border-left-color: #58a6ff; color: #f0f6fc; font-weight: 500; }
  .sidebar-item .count { font-size: 11px; color: #8b949e; margin-left: 4px; }
  .sidebar #screenList {white-space: nowrap;}

  /* Main */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  /* Header */
  .header { padding: 16px 24px; background: #161b22; border-bottom: 1px solid #30363d; display: flex; align-items: center; justify-content: space-between; min-height: 64px; }
  .header h1 { font-size: 18px; font-weight: 600; color: #f0f6fc; }

  /* Controls */
  .controls { display: flex; align-items: center; gap: 12px; padding: 12px 24px; background: #161b22; border-bottom: 1px solid #30363d; }
  .controls button { background: #21262d; border: 1px solid #30363d; color: #c9d1d9; padding: 6px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; transition: all 0.15s; }
  .controls button:hover:not(:disabled) { background: #30363d; color: #f0f6fc; }
  .controls button:disabled { opacity: 0.4; cursor: default; }
  .controls button.play { background: #238636; border-color: #2ea043; color: #fff; }
  .controls button.play:hover { background: #2ea043; }
  .controls button.play.playing { background: #da3633; border-color: #f85149; }
  .controls button.play.playing:hover { background: #f85149; }
  .slider-container { flex: 1; display: flex; align-items: center; gap: 12px; }
  .slider-container input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    flex: 1;
    height: 24px;
    background: transparent;
    cursor: pointer;
  }
  .slider-container input[type="range"]::-webkit-slider-runnable-track {
    width: 100%;
    height: 6px;
    background: #30363d;
    border-radius: 3px;
  }
  .slider-container input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    height: 28px;
    width: 28px;
    background: #58a6ff;
    border-radius: 50%;
    margin-top: -11px;
    border: 3px solid #161b22;
  }
  .slider-container input[type="range"]:focus {
    outline: none;
  }
  .slider-container input[type="range"]:focus::-webkit-slider-thumb {
    box-shadow: 0 0 0 3px #1f6feb;
  }
  .slider-container input[type="range"]::-moz-range-track {
    width: 100%;
    height: 6px;
    background: #30363d;
    border-radius: 3px;
  }
  .slider-container input[type="range"]::-moz-range-thumb {
    height: 28px;
    width: 28px;
    background: #58a6ff;
    border-radius: 50%;
    border: 3px solid #161b22;
  }
  .slider-label { font-size: 13px; color: #8b949e; white-space: nowrap; min-width: 50px; text-align: center; }
  .speed-control { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #8b949e; }
  .speed-control select { background: #21262d; border: 1px solid #30363d; color: #c9d1d9; padding: 4px 8px; border-radius: 4px; font-size: 12px; }

  /* Info bar */
  .info-bar { padding: 10px 24px; background: #1c2128; border-bottom: 1px solid #30363d; display: flex; gap: 24px; align-items: center; font-size: 13px; flex-wrap: wrap; }
  .info-bar .info-item { display: flex; align-items: center; gap: 6px; }
  .info-bar .info-label { color: #8b949e; }
  .info-bar .info-value { color: #c9d1d9; }
  .info-bar .info-value.commit { font-family: "SFMono-Regular", Consolas, monospace; font-size: 12px; color: #58a6ff; }

  /* Image viewer */
  .viewer { flex: 1; overflow: auto; display: flex; align-items: flex-start; justify-content: center; padding: 24px; background: #0d1117; }
  .viewer img { max-width: 100%; height: auto; border-radius: 8px; border: 1px solid #30363d; box-shadow: 0 4px 24px rgba(0,0,0,0.4); }
  .viewer.fit { overflow: hidden; align-items: center; }
  .viewer.fit img { max-width: 100%; max-height: 100%; object-fit: contain; }
  .viewer .no-image { color: #8b949e; font-size: 15px; margin-top: 100px; }
  .info-bar .loading-label { color: #8b949e; font-style: italic; }
  .viewer .text-view { display: none; width: 100%; max-width: 800px; font-family: "SFMono-Regular", Consolas, monospace; font-size: 13px; color: #c9d1d9; }
  .viewer .text-view .text-entry { padding: 12px 16px; border: 1px solid #30363d; border-radius: 6px; background: #161b22; margin-bottom: 8px; display: flex; gap: 16px; align-items: center; cursor: pointer; }
  .viewer .text-view .text-entry.current { border-color: #58a6ff; background: #1c2128; }
  .viewer .text-view .text-entry .rev-index { color: #8b949e; min-width: 36px; }
  .viewer .text-view .text-entry .rev-date { color: #8b949e; min-width: 180px; }
  .viewer .text-view .text-entry .rev-subject { color: #c9d1d9; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .viewer .text-view .text-entry .rev-hash { color: #58a6ff; min-width: 90px; }
  .viewer.text-mode img { display: none !important; }
  .viewer.text-mode .text-view { display: block; }

</style>

<div class="sidebar">

</div>

<div class="main">
  <div class="header">
    <div style="display:flex;align-items:center;gap:12px;">
      <button class="toggle-sidebar" id="toggleSidebar" title="Toggle sidebar">&#9776;</button>
      <h1 id="screenTitle">Select a screen</h1>
    </div>
  </div>
  <div class="controls">
    <button id="prevBtn" disabled>&larr; Prev</button>
    <button id="playBtn" class="play">&#9654; Play</button>
    <button id="nextBtn" disabled>Next &rarr;</button>
    <div class="slider-container">
      <input type="range" id="slider" min="0" max="0" value="0">
      <span class="slider-label" id="sliderLabel">0 / 0</span>
    </div>
    <div class="speed-control">
      <label for="speed">Speed:</label>
      <select id="speed">

        <option value="1000" selected>1x</option>
        <option value="500">2x</option>
        <option value="250">4x</option>
      </select>
    </div>
    <div class="speed-control">
      <label for="viewMode">View:</label>
      <select id="viewMode">
        <option value="scroll">Scroll</option>
        <option value="fit">Fit</option>
        <option value="text">Text</option>
      </select>
    </div>
  </div>
  <div class="info-bar" id="infoBar"></div>
  <div class="viewer">
    <img id="screenImg" src="" alt="" style="display:none;">
    <div id="textView" class="text-view"></div>
    <div id="noImage" class="no-image">Choose a screen from the sidebar to begin</div>
  </div>
</div>

let currentScreen = null;
let currentIndex = 0;
let playing = false;
let playTimer = null;

// Build sidebar
const listEl = document.getElementById('screenList');
DATA.forEach((screen, i) => {
  const el = document.createElement('div');
  el.className = 'sidebar-item';
  el.innerHTML = screen.displayName + ' <span class="count">(' + screen.entries.length + ')</span>';
  el.addEventListener('click', () => selectScreen(i));
  listEl.appendChild(el);
});

function selectScreen(idx) {
  stopPlay();
  const prevEntry = currentScreen ? currentScreen.entries[currentIndex] : null;
  currentScreen = DATA[idx];

  // Try to keep the same revision (by folder name) when switching screens,
  // otherwise clamp previous index to valid range
  let newIndex = Math.min(currentIndex, currentScreen.entries.length - 1);
  if (prevEntry) {
    const matchIdx = currentScreen.entries.findIndex(e => e.folder === prevEntry.folder);
    if (matchIdx !== -1) newIndex = matchIdx;
  }
  currentIndex = newIndex;

  document.querySelectorAll('.sidebar-item').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });

  document.getElementById('screenTitle').textContent = currentScreen.displayName;

  const slider = document.getElementById('slider');
  slider.max = currentScreen.entries.length - 1;
  slider.value = currentIndex;

  // Preload all images for this screen
  currentScreen.entries.forEach(e => { const img = new Image(); img.src = e.path; });

  render();
}

function render() {
  if (!currentScreen) return;
  const entry = currentScreen.entries[currentIndex];
  const img = document.getElementById('screenImg');
  const noImg = document.getElementById('noImage');
  const slider = document.getElementById('slider');
  const label = document.getElementById('sliderLabel');

  noImg.style.display = 'none';
  img.style.display = 'block';
  img.onload = () => { const el = document.getElementById('loadingLabel'); if (el) el.remove(); };
  img.src = entry.path;
  img.alt = currentScreen.screenName;

  slider.value = currentIndex;
  label.textContent = (currentIndex + 1) + ' / ' + currentScreen.entries.length;

  document.getElementById('prevBtn').disabled = currentIndex === 0;
  document.getElementById('nextBtn').disabled = currentIndex === currentScreen.entries.length - 1;

  // Info bar
  const infoBar = document.getElementById('infoBar');
  infoBar.innerHTML = [
    '<div class="info-item"><span class="info-label">Revision:</span><span class="info-value">' + entry.folder + '</span></div>',
    '<div class="info-item"><span class="info-label">Date:</span><span class="info-value">' + entry.date + '</span></div>',
    '<div class="info-item"><span class="info-label">Author:</span><span class="info-value">' + entry.author + '</span></div>',
    '<div class="info-item"><span class="info-label">Commit:</span><span class="info-value commit">' + entry.commit.slice(0, 12) + '</span></div>',
    '<div class="info-item"><span class="info-label">Subject:</span><span class="info-value">' + entry.subject + '</span></div>',
    '<span class="loading-label" id="loadingLabel">Loading...</span>',
  ].join('');

  // Text view
  const textView = document.getElementById('textView');
  textView.innerHTML = currentScreen.entries.map((e, i) =>
    '<div class="text-entry' + (i === currentIndex ? ' current' : '') + '" data-idx="' + i + '">' +
      '<span class="rev-index">#' + (i + 1) + '</span>' +
      '<span class="rev-hash">' + e.commit.slice(0, 10) + '</span>' +
      '<span class="rev-date">' + e.date + '</span>' +
      '<span class="rev-subject">' + e.subject + '</span>' +
    '</div>'
  ).join('');
  textView.querySelectorAll('.text-entry').forEach(el => {
    el.addEventListener('click', () => {
      currentIndex = parseInt(el.dataset.idx);
      render();
    });
  });
  // Scroll current entry into view in text mode
  const cur = textView.querySelector('.text-entry.current');
  if (cur) cur.scrollIntoView({ block: 'nearest' });
}

// Controls
document.getElementById('prevBtn').addEventListener('click', () => {
  if (currentIndex > 0) { currentIndex--; render(); }
});
document.getElementById('nextBtn').addEventListener('click', () => {
  if (currentScreen && currentIndex < currentScreen.entries.length - 1) { currentIndex++; render(); }
});
document.getElementById('slider').addEventListener('input', (e) => {
  currentIndex = parseInt(e.target.value);
  render();
});

// Play/pause
const playBtn = document.getElementById('playBtn');
function startPlay() {
  if (!currentScreen) return;
  playing = true;
  playBtn.classList.add('playing');
  playBtn.innerHTML = '&#9632; Stop';
  tick();
}
function stopPlay() {
  playing = false;
  playBtn.classList.remove('playing');
  playBtn.innerHTML = '&#9654; Play';
  clearTimeout(playTimer);
}
function tick() {
  if (!playing || !currentScreen) return;
  if (currentIndex < currentScreen.entries.length - 1) {
    currentIndex++;
    render();
    playTimer = setTimeout(tick, parseInt(document.getElementById('speed').value));
  } else {
    stopPlay();
  }
}
playBtn.addEventListener('click', () => {
  if (playing) { stopPlay(); } else {
    if (currentScreen && currentIndex >= currentScreen.entries.length - 1) { currentIndex = 0; }
    startPlay();
  }
});

// Keyboard (skip when slider is focused to avoid double-step)
document.addEventListener('keydown', (e) => {
  if (document.activeElement === document.getElementById('slider')) return;
  if (e.key === 'ArrowLeft') { if (currentIndex > 0) { currentIndex--; render(); } }
  if (e.key === 'ArrowRight') { if (currentScreen && currentIndex < currentScreen.entries.length - 1) { currentIndex++; render(); } }
  if (e.key === ' ') { e.preventDefault(); playBtn.click(); }
});

// View mode toggle
function setViewMode(mode) {
  const viewer = document.querySelector('.viewer');
  viewer.classList.remove('fit', 'text-mode');
  if (mode === 'fit') viewer.classList.add('fit');
  if (mode === 'text') viewer.classList.add('text-mode');
}
document.getElementById('viewMode').addEventListener('change', (e) => setViewMode(e.target.value));

// Sidebar toggle
document.getElementById('toggleSidebar').addEventListener('click', () => {
  document.querySelector('.sidebar').classList.toggle('collapsed');
});

// Auto-select first screen
if (DATA.length > 0) selectScreen(0);
</script>
